version: '3.9'

services:
  blockchain:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: blockchain-api
    restart: always

  nginx:
    image: nginx:latest
    container_name: blockchain-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blockchain
